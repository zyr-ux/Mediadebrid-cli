name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            rid: win-x64
            arch: x64
          - os: windows-latest
            rid: win-arm64
            arch: arm64

          # Linux
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64

          # macOS
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Strip version prefix
        id: version
        shell: bash
        run: echo "ver=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Native AOT Dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish
        run: >
          dotnet publish -c Release
          -r ${{ matrix.rid }}
          /p:PublishAot=true
          /p:SelfContained=true
          /p:Version=${{ steps.version.outputs.ver }}
          -o ./publish/${{ matrix.rid }}

      # --- Windows: per-arch installer ---
      - name: Build Inno Setup Installer
        if: runner.os == 'Windows'
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.7
        with:
          path: installer.iss
          options: /DMyAppVersion=${{ steps.version.outputs.ver }} /DArch=${{ matrix.arch }}

      - name: Prepare Windows Artifacts
        if: runner.os == 'Windows'
        shell: bash
        run: |
          if [[ "${{ matrix.arch }}" == "x64" ]]; then
            mv Output/*.exe ./publish/${{ matrix.rid }}/mediadebrid-win-installer-x64.exe
          else
            mv Output/*.exe ./publish/${{ matrix.rid }}/mediadebrid-win-installer-arm64.exe
          fi

      # --- Unix: chmod + rename ---
      - name: Prepare Unix Artifacts
        if: runner.os != 'Windows'
        run: |
          chmod +x ./publish/${{ matrix.rid }}/mediadebrid

          if [[ "${{ matrix.rid }}" == "osx-x64" ]]; then
            mv ./publish/${{ matrix.rid }}/mediadebrid ./publish/${{ matrix.rid }}/mediadebrid-mac-x64
          elif [[ "${{ matrix.rid }}" == "osx-arm64" ]]; then
            mv ./publish/${{ matrix.rid }}/mediadebrid ./publish/${{ matrix.rid }}/mediadebrid-mac-arm64
          else
            mv ./publish/${{ matrix.rid }}/mediadebrid ./publish/${{ matrix.rid }}/mediadebrid-${{ matrix.rid }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediadebrid-${{ matrix.rid }}
          path: ./publish/${{ matrix.rid }}/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
          files: |
            mediadebrid-win-x64/mediadebrid-win-installer-x64.exe
            mediadebrid-win-arm64/mediadebrid-win-installer-arm64.exe
            mediadebrid-linux-x64/mediadebrid-linux-x64
            mediadebrid-linux-arm64/mediadebrid-linux-arm64
            mediadebrid-osx-x64/mediadebrid-mac-x64
            mediadebrid-osx-arm64/mediadebrid-mac-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}